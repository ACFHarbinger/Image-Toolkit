name: ASP Regression Gate

on:
  push:
    branches: [main]
  schedule:
    # Weekly run: every Monday at 06:00 UTC (catches dep-induced regressions
    # that don't touch the codebase, e.g. a scipy minor bump).
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  animation-unit-tests:
    name: ASP unit tests (800+ fast tests, ~60 s)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-animation-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-animation-${{ runner.os }}-

      - name: Install project dependencies (frozen, skip Rust build)
        # Full runtime install so torch/scipy/opencv are available.
        # maturin build is skipped — ASP tests are pure Python.
        run: uv sync --frozen --group dev --no-install-project

      - name: Run ASP unit test suite (§5.1A / 3.13)
        # 800+ unit tests covering bundle_adjust, compositing, frame_selection,
        # canvas, pipeline, matching.  Each runs in <1 s without GPU.
        # Failure here means a pipeline stage regressed on push to main.
        run: uv run pytest backend/test/animation/ -q --tb=short --no-header
        env:
          PYTHONPATH: .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: animation-test-results-${{ github.sha }}
          path: .pytest_cache/
          retention-days: 14
