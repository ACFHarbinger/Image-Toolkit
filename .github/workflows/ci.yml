name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Import-linter + mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-lint-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-lint-${{ runner.os }}-

      - name: Install project dependencies (frozen, skip C++ build)
        # --no-install-project skips the C++ extension build so it is not
        # compiled.  All Python runtime and dev deps are installed from the lockfile.
        run: uv sync --frozen --group dev --no-install-project

      - name: Run import-linter contracts (§5.11A / A.17)
        run: uv run lint-imports
        env:
          PYTHONPATH: .

      - name: mypy — strict modules (§5.5A / A.10)
        run: >
          uv run mypy
          backend/src/errors/exceptions.py
          backend/src/models/core/base.py
          --ignore-missing-imports
          --no-error-summary
        env:
          PYTHONPATH: .

  test-models:
    name: Model wrapper contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-test-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-test-${{ runner.os }}-

      - name: Install project dependencies (frozen, skip Rust build)
        run: uv sync --frozen --group dev --no-install-project

      - name: Run model contract tests (§5.16A / A.9)
        # All heavy deps (torch, kornia, etc.) are patched into sys.modules
        # by the tests themselves — no GPU required, <1 s per test.
        run: uv run pytest backend/test/models/ -q --tb=short
        env:
          PYTHONPATH: .

  pytest:
    name: Python unit and integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-pytest-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-pytest-${{ runner.os }}-

      - name: Install project dependencies (frozen, skip C++ build)
        run: uv sync --frozen --group dev --no-install-project

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install system C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev libssl-dev libfftw3-dev libsodium-dev libsqlcipher-dev ninja-build libeigen3-dev

      - name: Build Cryptography JAR
        run: ./gradlew :cryptography:shadowJar

      - name: Build and install C++ base extension
        run: |
          uv run cmake -B build/base base/ -G Ninja -DCMAKE_BUILD_TYPE=Release
          uv run cmake --build build/base --parallel
          uv run cmake --install build/base --prefix .

      - name: Run pytest
        run: uv run pytest --skip-gpu -m "not slow" -q --tb=short
        env:
          PYTHONPATH: .
