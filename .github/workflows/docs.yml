name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'moon/roadmaps/**'
      - 'moon/CHANGELOG.md'
      - 'moon/ROADMAP.md'
      - 'reports/**'
      - 'backend/src/**/*.py'
      - 'base/src/math/**/*.rs'
      - 'frontend/src/math/**/*.ts'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'moon/roadmaps/**'
      - 'backend/src/**/*.py'
      - 'mkdocs.yml'

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Python docs (mkdocstrings + MkDocs build) ────────────────────
  docs-python:
    name: MkDocs build (Python API + portal)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-revision-date-localized plugin

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-docs-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-docs-${{ runner.os }}-

      - name: Install Python dependencies (skip Rust build)
        run: uv sync --frozen --group dev --no-install-project

      - name: Install MkDocs and plugins
        run: |
          uv pip install \
            mkdocs-material \
            mkdocstrings[python] \
            pymdown-extensions \
            griffe

      - name: Build MkDocs portal (strict — breaks on warnings)
        run: uv run mkdocs build --strict --verbose
        env:
          PYTHONPATH: .

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  # ── Job 2: Rust doc-tests ────────────────────────────────────────────────
  docs-rust:
    name: cargo test --doc (math modules)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            base/target
          key: cargo-docs-${{ runner.os }}-${{ hashFiles('base/Cargo.lock') }}
          restore-keys: cargo-docs-${{ runner.os }}-

      - name: cargo test --doc
        working-directory: base
        run: cargo test --doc
        # Runs all /// ```rust ... ``` examples in the math modules.
        # Failures indicate the documented API has drifted from implementation.

      - name: cargo doc (check for broken intra-doc links)
        working-directory: base
        run: cargo doc --no-deps --document-private-items 2>&1
        env:
          RUSTDOCFLAGS: "-D warnings"
          # Treat all rustdoc warnings (missing docs, broken links) as errors.

  # ── Job 3: Markdown link check ───────────────────────────────────────────
  docs-links:
    name: Markdown link check (lychee)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: lychee — check all Markdown links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --include-verbatim
            --exclude 'https://crates.io'
            --exclude 'https://mybinder.org'
            --exclude 'https://polyfill.io'
            --exclude 'https://cdn.jsdelivr.net'
            '**/*.md'
          fail: true

  # ── Job 4: TypeScript docs (TypeDoc) ────────────────────────────────────
  docs-typescript:
    name: TypeDoc (frontend/src/math)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: TypeDoc — generate reference docs
        working-directory: frontend
        run: |
          npx typedoc \
            --entryPointStrategy expand \
            --out ../site/api/typescript \
            src/math
        continue-on-error: true
        # Advisory only until math/ coverage reaches 100%.
        # Remove continue-on-error once --treatWarningsAsErrors is stable.

  # ── Job 5: Deploy to GitHub Pages (main branch only) ────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [docs-python, docs-rust, docs-links]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-deploy-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-deploy-${{ runner.os }}-

      - name: Install Python dependencies (skip Rust build)
        run: uv sync --frozen --group dev --no-install-project

      - name: Install MkDocs and plugins
        run: |
          uv pip install \
            mkdocs-material \
            mkdocstrings[python] \
            pymdown-extensions \
            griffe

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --clean
        env:
          PYTHONPATH: .
