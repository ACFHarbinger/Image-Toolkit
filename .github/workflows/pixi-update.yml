name: Pixi Dependency Update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pixi-update.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/pixi-update.yml'
  schedule:
    - cron: "0 0 * * 1" # Weekly on Monday mornings
  workflow_dispatch:

concurrency:
  group: pixi-update
  cancel-in-progress: true

jobs:
  update-dependencies:
    name: Update Pixi dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          file: pixi.toml
          cache: true

      - name: Run pixi update
        run: |
          pixi update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update pixi dependencies"
          title: "chore(deps): update pixi dependencies"
          body: |
            Automated dependency updates for `pixi.toml` and `pixi.lock`.
            
            This pull request was automatically generated by the Pixi Dependency Update workflow.
          branch: "pixi-update/dependencies"
          delete-branch: true
          labels: |
            dependencies
            pixi
