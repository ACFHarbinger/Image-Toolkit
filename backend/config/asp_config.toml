# asp_config.toml — Anime Stitch Pipeline configuration
#
# Loaded automatically at pipeline startup via animation/__init__.py.
# Keys are written to os.environ via setdefault (env vars always win over TOML).
# All available keys and their ranges are documented in
# backend/src/animation/core/config.py (_CONFIG_SCHEMA).
#
# 2026-07 trim: the pipeline now runs its benchmarked default path without
# TOML overrides.  Add keys here only after a full-corpus benchmark shows the
# change is an improvement.

[compositing]
# §4.2: GraphCut global multi-image seam (default ON; set 0 to fall back to
# pairwise DP seams for A/B comparison).
ASP_GRAPHCUT_SEAM = 1
