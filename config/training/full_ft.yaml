# config/training/full_ft.yaml
# Full SDXL checkpoint fine-tune.
# Requires DeepSpeed ZeRO-2 (24 GB) or ZeRO-3 + CPU offload (16 GB).
# EMA is empirically required at full fine-tune scale.

# @package training
stage: full_ft
method: none    # no LoRA adapters — full UNet params

# Selective freezing
freeze_down_blocks: 0    # 0 = freeze none; 2 = freeze first two down_blocks (saves ~2 GB)
freeze_text_encoders: true

# Memory
resolution: 1024
train_batch_size: 1
gradient_accumulation_steps: 8   # effective batch 8
gradient_checkpointing: true
mixed_precision: bf16

max_train_steps: 12000
max_train_epochs: null

noise_offset: 0.0
shuffle_tags: true
keep_tokens: 1
caption_dropout_rate: 0.05

# EMA strongly recommended for full fine-tune stability
use_ema: true
ema_decay: 0.9999

save_every_n_steps: 1000

xformers: true
cache_latents: true
cache_latents_to_disk: true
cache_text_encoder_outputs: true
full_bf16: true
