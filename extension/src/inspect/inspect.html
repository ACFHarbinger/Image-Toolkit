<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Metadata — Image Toolkit</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 16px; background: #2c2f33; color: #dcddde; font-size: 13px; }
        h2 { margin: 0 0 4px 0; font-size: 1.05em; color: #fff; }
        h3 { margin: 14px 0 6px 0; font-size: 0.95em; color: #fff; border-bottom: 1px solid #4f545c; padding-bottom: 4px; }
        .src { color: #3498db; word-break: break-all; font-size: 0.85em; }
        .dims { color: #999; margin: 4px 0 8px 0; }
        .kv { display: grid; grid-template-columns: 140px 1fr; gap: 4px 10px; }
        .kv .k { color: #999; }
        .kv .v { word-break: break-word; white-space: pre-wrap; }
        pre { background: #23272a; border: 1px solid #4f545c; border-radius: 4px; padding: 8px; overflow: auto; max-height: 320px; white-space: pre-wrap; word-break: break-word; margin: 4px 0; }
        .ai-tool { display: inline-block; background: #5865f2; color: #fff; border-radius: 10px; padding: 2px 10px; font-size: 0.85em; margin-bottom: 6px; }
        button { background: #4f545c; color: white; border: none; padding: 4px 12px; cursor: pointer; border-radius: 4px; font-size: 0.85em; }
        button:hover { background: #5d636b; }
        .empty { color: #999; font-style: italic; }
        #thumb { max-width: 180px; max-height: 180px; border-radius: 4px; float: right; margin-left: 12px; }
    </style>
</head>
<body>
    <img id="thumb" alt="">
    <h2>Image Metadata</h2>
    <div id="src" class="src"></div>
    <div id="dims" class="dims"></div>
    <div id="content"><span class="empty">Loading…</span></div>
    <script src="inspect.js"></script>
</body>
</html>
