site_name: Image-Toolkit Documentation
site_description: >-
  Unified documentation portal for Image-Toolkit — image database, ASP pipeline,
  analytics dashboard, and cross-platform interfaces.
site_author: ACFPeacekeeper
repo_url: https://github.com/ACFPeacekeeper/Image-Toolkit
repo_name: ACFPeacekeeper/Image-Toolkit
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            filters:
              - "!^_" # exclude private members
              - "!^__" # exclude dunder methods (except __init__)
              - "__init__"
  # Notebook support — mkdocs-jupyter renders .ipynb files as portal pages.
  # Notebooks are pre-stripped of outputs by nbstripout; only the code and
  # markdown cells are rendered (no execution at build time).
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true
      # Allow the strict MkDocs build to continue even if a notebook cell
      # contains an unresolvable link or a non-Markdown extension.
      allow_errors: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ACFPeacekeeper/Image-Toolkit

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: readme.md
      - Architecture: ARCHITECTURE.md
      - C4 Architecture Model: STRUCTURIZR.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Reference:
      - REST API: api/rest-api.md
      - Python API:
          - ASP Pipeline: api/python/animation.md
          - Backend Core: api/python/core.md
          - Models: api/python/models.md
      - Rust API:
          - Math Backbone: api/rust/math.md
      - TypeScript API:
          - Overview: api/typescript/readme.md
      - Kotlin API:
          - Overview: api/kotlin/index.md
      - Python Reference (Sphinx):
          - Overview: api/sphinx.md
  - Notebooks:
      - Benchmark Analysis: notebooks/benchmark_analysis.ipynb
      - ASP Pipeline Walkthrough: notebooks/asp_pipeline_walkthrough.ipynb
      - CLIP Embedding Walkthrough: notebooks/clip_embedding_walkthrough.ipynb
  - Operations:
      - Benchmarks: BENCHMARKS.md
      - Dependency Policy: DEPENDENCY_POLICY.md
      - Documentation Standards: DOCUMENTATION_STANDARDS.md
  - Roadmaps:
      - Master Roadmap: roadmaps/ROADMAP.md
      - Architecture: roadmaps/architecture.md
      - Performance: roadmaps/performance.md
      - New Features: roadmaps/new_features.md
      - GUI / UX: roadmaps/gui_ux.md
      - ASP Pipeline: roadmaps/asp.md
      - Content Generation: roadmaps/content_generation.md
      - Analytics & Interpretability: roadmaps/analytics_and_interpretability.md
      - Documentation: roadmaps/documentation.md
  - Reports:
      - Analytics & Codebase Visualisation: reports/analytics.md
      - ASP Comprehensive Research: reports/asp_research.md
      - Image Generation Research: reports/image_generation.md
      - Image Stitching Research: reports/image_stitching.md
  - Changelog: CHANGELOG.md

# Hooks — symlink moon/ and reports/ content into docs/ at build time
hooks:
  - docs/hooks.py
