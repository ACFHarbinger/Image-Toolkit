[workspace]
name = "image-toolkit"
version = "0.1.0"
description = "Image database and editing toolkit with high-performance C++/Rust backend, Tauri frontend, and ML pipelines"
authors = ["ACFHarbinger"]
channels = ["conda-forge"]
platforms = [
    #"osx-arm64", 
    #"osx-64", 
    { platform = "linux-64", glibc = "2.34" }
]

# ---------------------------------------------------------------------------
# Conda dependencies — installed as pre-compiled binaries from conda-forge
# or the pytorch channel.  These replace the uv/pip equivalents for the
# packages that ship with native shared libraries (CUDA, MKL, etc.).
# ---------------------------------------------------------------------------
[dependencies]
# ── Language runtimes ────────────────────────────────────────────────────────
python  = "3.11.*"
nodejs  = "20.*"   # Tauri / React / Electron frontend
rust    = "*"      # Cargo for frontend/src-tauri (replaces system rustup)

# ── C++ build toolchain ──────────────────────────────────────────────────────
cmake        = ">=3.18"
ninja        = "*"
cxx-compiler = "*"
c-compiler   = "*"
pkg-config   = "*"
# openmp       = "*"   # Required by base/CMakeLists.txt (OpenMP::OpenMP_CXX)
eigen        = "*"   # Eigen3 (CMake fetches it if absent; conda avoids that)
pybind11     = "*"   # pybind11_add_module — also available from conda-forge

# ── Computer Vision & ML (heavy binaries — best taken from conda) ────────────
pytorch     = { version = ">=2.9.1", channel = "conda-forge" }
torchvision = { version = ">=0.24.1", channel = "conda-forge" }
torchaudio  = { version = "<2.10.0",  channel = "conda-forge" }
onnxruntime = ">=1.25.1"
opencv      = ">=4.8,<5" # opencv conda package supplies libopencv shared libs
numpy       = "<2.0.0"   # cap to <2 — several deps not yet 2.x-compatible
pillow      = ">=12.0.0"
scipy       = ">=1.16"
scikit-learn = ">=1.8"

# ── Database & async DB drivers ───────────────────────────────────────────────
psycopg2    = ">=2.9"    # C-extension; conda build avoids binary wheel issues
sqlalchemy  = ">=2.0"

# ── System libraries surfaced through pkg-config ─────────────────────────────
openssl     = "*"    # Optional: finder.cpp SHA-256 via EVP API
fftw        = "*"    # Optional: sr_classical.cpp DCT/FFT fast path
libsodium   = "*"

# ── Platform-specific OpenMP implementations ──────────────────────────────────
#[target.osx-arm64.dependencies]
#llvm-openmp = "*"

#[target.osx-64.dependencies]
#llvm-openmp = "*"

[target.linux-64.dependencies]
libgomp = "*"

# ---------------------------------------------------------------------------
# PyPI dependencies — packages not reliably available on conda-forge,
# or where the PyPI wheel is the canonical distribution.
# ---------------------------------------------------------------------------
[pypi-dependencies]
# ── Web / API framework ───────────────────────────────────────────────────────
django               = ">=5.2.7"
django-cors-headers  = ">=4.9.0"
djangorestframework  = ">=3.16.1"
drf-spectacular      = ">=0.27.2"
fastapi              = "*"
uvicorn              = "*"
celery               = ">=5.6.0"
redis                = ">=7.1.0"
aiohttp              = ">=3.13.5"

# ── ML / AI models & utilities ────────────────────────────────────────────────
diffusers            = ">=0.35.2"
accelerate           = ">=1.12.0"
transformers         = ">=4.57.2"
tokenizers           = ">=0.22.1"
sentence-transformers = ">=2.6.0"
peft                 = ">=0.18.0"
timm                 = ">=1.0.26"
einops               = ">=0.8.2"
kornia               = ">=0.8.2"
safetensors          = ">=0.7.0"
faiss-cpu            = ">=1.7.4"
spandrel             = ">=0.4.2"
torchsde             = ">=0.2.6"
FlagEmbedding        = "<1.3.5"
transparent-background = ">=1.3.4"
sam-2                = { git = "https://github.com/facebookresearch/sam2", rev = "2b90b9f5ceec907a1c18123530e92e794ad901a4" }

# ── GUI (PySide6) ─────────────────────────────────────────────────────────────
pyside6              = ">=6.10.0"
pyopengl             = ">=3.1.10"
glfw                 = ">=2.10.0"

# ── Image & video processing ──────────────────────────────────────────────────
imagehash            = ">=4.3.2"
scenedetect          = ">=0.6.7.1"
moviepy              = ">=1.0.3"
av                   = ">=17.0.1"
albumentations       = ">=2.0.8"
rembg                = "<2.0.75"

# ── Cloud / browser automation ────────────────────────────────────────────────
selenium             = ">=4.38.0"
webdriver-manager    = ">=4.0.2"
dropbox              = ">=12.0.2"
google-api-python-client = ">=2.187.0"
google-auth-oauthlib = ">=1.2.3"
msal                 = ">=1.34.0"

# ── DB / storage utilities ────────────────────────────────────────────────────
alembic              = ">=1.18.4"
psycopg              = { version = ">=3.2", extras = ["pool"] }
blake3               = ">=1.0.8"

# ── Python utilities ──────────────────────────────────────────────────────────
loguru               = ">=0.7.3"
pydantic             = ">=2.13.3"
pydantic-settings    = ">=2.14.0"
python-dotenv        = ">=1.2.1"
hydra-core           = ">=1.3.2"
omegaconf            = ">=2.3.0"
requests             = ">=2.32.5"
tqdm                 = ">=4.67.1"
filelock             = ">=3.20.0"
send2trash           = ">=1.8.3"
screeninfo           = ">=0.8.1"
psutil               = ">=7.1.3"
cffi                 = ">=2.0.0"
jpype1               = ">=1.6.0"
simpleeval           = ">=1.0.7"
chardet              = "<6.0.0"
yarl                 = ">=1.23.0"
sentencepiece        = ">=0.2.1"
comfy-aimdo          = ">=0.3.0"
comfy-kitchen        = ">=0.2.8"
comfyui-embedded-docs = ">=0.4.4"
comfyui-frontend-package = ">=1.43.1"
comfyui-workflow-templates = ">=0.9.66"
comtypes             = ">=1.4.13"

# ── System libraries ──────────────────────────────────────────────────────────
#pysqlcipher3 = "*"

# ---------------------------------------------------------------------------
# Feature environments
# ---------------------------------------------------------------------------
[feature.dev.pypi-dependencies]
pytest           = ">=8.4.2"
ruff             = ">=0.14.3"
black            = ">=25.9.0"
mypy             = ">=1.18.2"
import-linter    = ">=2.0"
pip-audit        = ">=2.9.0"
pyinstaller      = ">=6.16.0"
cryptography     = ">=46.0.3"

[feature.benchmark.pypi-dependencies]
matplotlib       = ">=3.10.8"
pandas           = ">=2.3.3"
plotly           = ">=6.6.0"
streamlit        = ">=1.54.0"

# ---------------------------------------------------------------------------
# Environments — compose features on top of the default dependency set.
# ---------------------------------------------------------------------------
[environments]
default   = { solve-group = "default" }
dev       = { features = ["dev"],       solve-group = "default" }
benchmark = { features = ["benchmark"], solve-group = "default" }

# ---------------------------------------------------------------------------
# Tasks — replacing shell scripts & Justfile recipes.
# Run with: pixi run <task-name>
# ---------------------------------------------------------------------------
[tasks]
# ── C++ extension (base/) ─────────────────────────────────────────────────────
build-base = { cmd = "cmake -B build/base base/ -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INCLUDE_PATH=/usr/include/sqlcipher:/usr/include && cmake --build build/base --parallel", description = "Builds the pybind11 C++ base extension" }
test-base = { cmd = "cmake --build build/base --target test", depends-on = ["build-base"], description = "Runs native C++ Catch2 unit tests" }

# ── Python backend ────────────────────────────────────────────────────────────
start-backend = { cmd = "python main.py server", depends-on = ["build-base"], description = "Starts the Django/FastAPI backend" }
test-python   = { cmd = "pytest backend/test", description = "Runs Python test suite" }
lint          = { cmd = "ruff check . && ruff format --check .", description = "Lints all Python source files" }

# ── Tauri / React frontend ────────────────────────────────────────────────────
install-frontend = { cmd = "npm install", cwd = "frontend", description = "Installs frontend npm dependencies" }
start-frontend   = { cmd = "npm run tauri:dev", cwd = "frontend", depends-on = ["install-frontend"], description = "Starts the Tauri desktop app in dev mode" }
build-frontend   = { cmd = "npm run tauri:build", cwd = "frontend", depends-on = ["install-frontend"], description = "Builds the Tauri desktop app for release" }

# ── Electron (alternative to Tauri) ──────────────────────────────────────────
start-electron = { cmd = "npm run electron-dev", cwd = "frontend", depends-on = ["install-frontend"], description = "Starts the Electron desktop app in dev mode" }

# ── Master dev command ────────────────────────────────────────────────────────
dev = { depends-on = ["build-base", "start-backend", "start-frontend"], description = "Builds C++ then starts the full application stack" }
